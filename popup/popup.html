<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snaption</title>
  <!-- Zero-flash theme bootstrap: read cached theme from localStorage before CSS paints.
       The canonical source is chrome.storage.sync, synced to localStorage on every change. -->
  <script>
    (function () {
      try {
        var pref = localStorage.getItem('snaption-theme') || 'system';
        var resolved = pref === 'system'
          ? (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : pref;
        if (resolved === 'dark') document.documentElement.classList.add('theme-dark');
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">

    <!-- Not authenticated / no templates -->
    <div id="view-setup" class="view hidden">
      <div class="empty-state">
        <div class="logo">S</div>
        <p id="setup-message">Set up Snaption to start saving bookmarks.</p>
        <button id="btn-open-settings" class="btn btn-primary">Open Settings</button>
      </div>
    </div>

    <!-- Loading -->
    <div id="view-loading" class="view">
      <div class="loader"></div>
    </div>

    <!-- Save form -->
    <div id="view-save" class="view hidden">
      <header class="popup-header">
        <span id="workspace-name" class="workspace"></span>
        <div class="header-actions">
          <div class="theme-picker" id="theme-picker" role="group" aria-label="Theme">
            <button data-theme="light" title="Light" aria-label="Light">☀</button>
            <button data-theme="system" title="Match system" aria-label="System">◐</button>
            <button data-theme="dark" title="Dark" aria-label="Dark">☾</button>
          </div>
          <button id="btn-settings" class="icon-btn" title="Settings">⚙</button>
        </div>
      </header>

      <!-- Template picker -->
      <div class="template-picker" id="template-picker"></div>

      <!-- Auto fields: title (editable) + URL (readonly). Additional editable rows
           appear if the template has an 'auto' description-style rich_text field. -->
      <div class="form" id="auto-form"></div>

      <!-- Template preview (what the template sets silently) -->
      <div class="template-preview hidden" id="template-preview"></div>

      <div class="screenshot-preview hidden" id="screenshot-wrap">
        <label class="screenshot-toggle">
          <input type="checkbox" id="include-screenshot" checked />
          Include screenshot
        </label>
        <img id="screenshot-img" alt="Page screenshot" />
      </div>

      <div id="save-status" class="status hidden"></div>

      <footer class="popup-footer">
        <button id="btn-save" class="btn btn-primary" title="⌘/Ctrl + Enter">
          Save to Notion
          <span class="kbd-hint">⌘↵</span>
        </button>
      </footer>
    </div>

    <!-- Success -->
    <div id="view-success" class="view hidden">
      <div class="empty-state">
        <div class="success-icon">✓</div>
        <p id="success-msg">Saved to Notion!</p>
        <a id="open-notion-link" href="#" target="_blank" class="btn btn-secondary">Open in Notion</a>
      </div>
    </div>

  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
